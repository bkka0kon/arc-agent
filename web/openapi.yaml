openapi: 3.1.0
info:
  title: Arc Agentic API
  version: "0.1.0"
  description: |
    Catalog of paid services on Arc Agentic — a stablecoin-native
    agent marketplace running on **Arc** (Circle's stablecoin Layer 1)
    via **x402** + **Circle Gateway**.

    ## Payment model
    Every endpoint is gated by HTTP 402. The first request returns a
    `402 Payment Required` with a `PAYMENT-REQUIRED` header describing
    the price and accepted networks. The agent signs a payment header
    (`PAYMENT-SIGNATURE`) and retries — the seller's middleware verifies
    against Circle Gateway and only then runs the handler.

    All prices are in **USDC** on **Arc Testnet** (CAIP-2 id `eip155:5042002`).
    Sub-cent amounts are settled in batched nanopayments — per-call gas
    is effectively zero.

    ## For AI agents
    Drop the URL pattern of any endpoint into your prompt; the schema
    here mirrors what each endpoint returns. Combine multiple endpoints
    using the bundle recipes in `web/data.js` → `BUNDLES`.

    Reference orchestrator: `agent/orchestrator.js` (runs any bundle id).

  contact:
    name: Arc Agentic
    url: https://github.com/anhdopc/liftup-agents
  license:
    name: MIT

servers:
  - url: https://arc-agent-seven.vercel.app/api
    description: Live reference deployment on Arc Testnet (Vercel Edge Functions)
  - url: https://{subdomain}.arc-agentic.dev
    description: Placeholder per-service domains (not all deployed yet)
    variables:
      subdomain:
        default: data
        enum: [search, infer, data, chain, risk, fin, news, defi]

tags:
  - name: Search
    description: Discovery — find tokens / protocols / contracts.
  - name: Inference
    description: LLM completion, reasoning, contract explanation.
  - name: Data
    description: Price feeds, TVL, wallet history, sentiment.
  - name: Meta
    description: |
      Free observability — `/v1/health` (catalog manifest, no payment)
      and `/v1/admin/stats` (revenue + payers leaderboard derived live
      from the seller wallet's on-chain history).

# x-live: true on a path indicates the endpoint is deployed and
# 402-gated against the live Vercel server above. Anything without
# x-live is a placeholder in this catalog awaiting a seller.

# ════════════════════════════════════════════════════════════════
#  PAYMENT RESPONSES (referenced by every endpoint)
# ════════════════════════════════════════════════════════════════
components:
  responses:
    PaymentRequired:
      description: |
        Payment required. Sign the `accepts` payload with your Agent Wallet
        and retry with `PAYMENT-SIGNATURE` header.
      headers:
        PAYMENT-REQUIRED:
          schema:
            type: string
          description: JSON-encoded payment requirement (see schema).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentRequiredBody"
    Success:
      description: Payment verified, handler ran, data returned.
      content:
        application/json:
          schema:
            type: object
            description: Endpoint-specific shape. See each path for details.
            additionalProperties: true

  schemas:
    PaymentRequiredBody:
      type: object
      required: [x402Version, accepts]
      description: |
        x402 v2 PaymentRequired body, aligned with Circle Gateway's
        `/v1/x402/supported` advertisement for Arc Testnet
        (scheme `GatewayWalletBatched`).
      properties:
        x402Version: { type: integer, example: 2 }
        accepts:
          type: array
          items:
            type: object
            required: [scheme, network, maxAmountRequired, resource, payTo, asset, extra]
            properties:
              scheme:           { type: string, example: "exact" }
              network:          { type: string, example: "eip155:5042002" }
              maxAmountRequired: { type: string, description: "Atomic USDC units (string).", example: "1000" }
              resource:         { type: string, example: "https://arc-agent-seven.vercel.app/api/v1/price/ETH" }
              description:      { type: string }
              mimeType:         { type: string, example: "application/json" }
              payTo:            { type: string, example: "0xEF4FE8d385b4E023265cb85703cF239F518b97a3" }
              maxTimeoutSeconds: { type: integer, example: 300 }
              asset:            { type: string, example: "0x3600000000000000000000000000000000000000" }
              extra:
                type: object
                required: [name, version, verifyingContract, minValiditySeconds, assets]
                properties:
                  name:               { type: string, example: "GatewayWalletBatched" }
                  version:            { type: string, example: "1" }
                  verifyingContract:  { type: string, example: "0x0077777d7eba4688bdef3e311b846f25870a19b9" }
                  minValiditySeconds: { type: integer, example: 604800 }
                  assets:
                    type: array
                    items:
                      type: object
                      properties:
                        symbol:   { type: string, example: "USDC" }
                        address:  { type: string, example: "0x3600000000000000000000000000000000000000" }
                        decimals: { type: integer, example: 6 }

  parameters:
    Token:
      name: token
      in: path
      required: true
      schema: { type: string }
      example: ETH
    Pair:
      name: pair
      in: path
      required: true
      schema: { type: string }
      example: ETH-USDC
    Address:
      name: address
      in: path
      required: true
      schema: { type: string, pattern: "^0x[a-fA-F0-9]{40}$" }
      example: "0x1234567890abcdef1234567890abcdef12345678"
    Symbol:
      name: symbol
      in: path
      required: true
      schema: { type: string }
      example: AAPL
    Protocol:
      name: protocol
      in: path
      required: true
      schema: { type: string }
      example: aave-v3

  securitySchemes:
    x402:
      type: http
      scheme: bearer
      bearerFormat: PAYMENT-SIGNATURE
      description: |
        x402 payment header. The first request to any path returns 402.
        Sign the `accepts` quote with your Agent Wallet, attach the
        signed payload as `PAYMENT-SIGNATURE`, and retry.

security:
  - x402: []

# ════════════════════════════════════════════════════════════════
#  PATHS
# ════════════════════════════════════════════════════════════════
paths:

  # ─────────── META (FREE) ───────────
  /v1/health:
    get:
      tags: [Meta]
      summary: Catalog manifest — list of live endpoints with price + try_url.
      description: |
        Free, unauthenticated. Returns every endpoint currently
        402-gated on the live Vercel deployment, with `price_usdc`
        and a `try_url` example call per entry. Agents re-fetch at
        boot to auto-discover what's available.
      x-live: true
      security: []          # override global x402 — this endpoint is free
      responses:
        "200":
          description: Marketplace catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string, example: "arc-agentic" }
                  network: { type: string, example: "eip155:5042002" }
                  gateway_url: { type: string }
                  seller_wallet_configured: { type: boolean }
                  ts: { type: string, format: date-time }
                  live_endpoint_count: { type: integer, example: 10 }
                  live_endpoints:
                    type: array
                    items:
                      type: object
                      properties:
                        path:      { type: string, example: "/v1/price/{token}" }
                        try_url:   { type: string, example: "/v1/price/ETH" }
                        method:    { type: string, example: "GET" }
                        price_usdc: { type: number, example: 0.001 }
                        desc:      { type: string }

  /v1/admin/stats:
    get:
      tags: [Meta]
      summary: Marketplace observability — revenue, settlements, top payers.
      description: |
        Free, unauthenticated. Derived live from the seller wallet's
        on-chain history via Arc RPC (last ~17 hours). Cached 60 s
        at the edge. No private database; every number here is
        reproducible from the same public event log.
      x-live: true
      security: []
      responses:
        "200":
          description: Aggregated marketplace stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  seller: { type: string }
                  network: { type: string, example: "eip155:5042002" }
                  revenue_usdc: { type: number }
                  revenue_usdc_formatted: { type: string }
                  settlement_count: { type: integer }
                  unique_payers: { type: integer }
                  last_settlement: { type: string, format: date-time, nullable: true }
                  scan_window_blocks: { type: integer }
                  live_endpoints: { type: integer }
                  top_payers:
                    type: array
                    items:
                      type: object
                      properties:
                        address:          { type: string }
                        paid_usdc:        { type: number }
                        settlement_count: { type: integer }
                  ts: { type: string, format: date-time }

  # ─────────── SEARCH ───────────
  /v1/token/find:
    get:
      tags: [Search]
      summary: Find a token by symbol, name or partial address.
      description: Price $0.001. Returns the canonical record across registries.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/dex/listings:
    get:
      tags: [Search]
      summary: DEX listings for a token (pair addresses, primary venue).
      description: Price $0.001.
      parameters: [{ name: q, in: query, required: true, schema: { type: string } }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/onchain/find:
    post:
      tags: [Search]
      summary: Find addresses, swaps, contract deployments matching a pattern.
      description: Price $0.002.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { query: { type: string } } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/protocol/find:
    get:
      tags: [Search]
      summary: Search DeFi protocols by chain, category, or TVL band.
      description: Price $0.001.
      parameters: [{ name: q, in: query, required: true, schema: { type: string } }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/audit/{protocol}:
    get:
      tags: [Search]
      summary: Audit reports + contract risk flags for a protocol.
      description: Price $0.002.
      parameters: [{ $ref: "#/components/parameters/Protocol" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/web/search:
    get:
      tags: [Search]
      summary: Web search wrapper. DuckDuckGo Instant Answer by default; Brave when BRAVE_SEARCH_KEY env is set.
      description: Price $0.003.
      x-live: true
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          example: bitcoin halving
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }

  # ─────────── INFERENCE ───────────
  /v1/llm/complete:
    post:
      tags: [Inference]
      summary: Generic LLM completion (Claude / GPT / Grok routed per pricing).
      description: Price $0.005 per request (excluding token surcharge).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:      { type: string }
                max_tokens:  { type: integer, default: 512 }
                model_hint:  { type: string, example: "fast" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/llm/reason:
    post:
      tags: [Inference]
      summary: Higher-quality reasoning model for multi-step tasks.
      description: Price $0.01 per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:    { type: string }
                context: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/contract/source/{address}:
    get:
      tags: [Inference]
      summary: Verified Solidity source + ABI + compiler metadata.
      description: Price $0.002. ArcScan-backed. Source preview up to 6 KB; `source_truncated` flag + `source_length` for the full size.
      x-live: true
      parameters:
        - $ref: "#/components/parameters/Address"
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/contract/explain:
    post:
      tags: [Inference]
      summary: Plain-English explanation of what a contract does + entry points.
      description: Price $0.012. Wrap Source → LLM → structured summary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/audit/summarize:
    post:
      tags: [Inference]
      summary: Summarize a long audit report into bullets + severity buckets.
      description: Price $0.008.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { report_url: { type: string }, raw_text: { type: string } } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/defi/qa:
    post:
      tags: [Inference]
      summary: Chat with a DeFi-specialized model (TVL / APY / risk vocabulary).
      description: Price $0.004 per turn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string }
                history:  { type: array, items: { type: object } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }

  # ─────────── DATA ───────────
  /v1/price/{token}:
    get:
      tags: [Data]
      summary: Real-time price for any token by symbol or address.
      description: Price $0.001. CoinGecko-backed.
      x-live: true
      parameters: [{ $ref: "#/components/parameters/Token" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/liquidity/{pair}:
    get:
      tags: [Data]
      summary: Liquidity depth and estimated slippage across DEXs.
      description: Price $0.001.
      parameters: [{ $ref: "#/components/parameters/Pair" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/sentiment/fear-greed:
    get:
      tags: [Data]
      summary: Crypto Fear & Greed Index — today + 7-day trend.
      description: Price $0.001. alternative.me-backed.
      x-live: true
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/flow/{token}:
    get:
      tags: [Data]
      summary: Whale and exchange in/out flows for a token.
      description: Price $0.002.
      parameters: [{ $ref: "#/components/parameters/Token" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/balance/{address}:
    get:
      tags: [Data]
      summary: Native (USDC gas) + USDC ERC-20 balances for an Arc address.
      description: Price $0.0005. Arc Testnet RPC direct.
      x-live: true
      parameters: [{ $ref: "#/components/parameters/Address" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/txs/{address}:
    get:
      tags: [Data]
      summary: Recent transaction history for a wallet.
      description: Price $0.001.
      parameters: [{ $ref: "#/components/parameters/Address" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/holdings/{address}:
    get:
      tags: [Data]
      summary: Token portfolio with USD valuations.
      description: Price $0.001.
      parameters: [{ $ref: "#/components/parameters/Address" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/risk-score:
    post:
      tags: [Data]
      summary: Wallet risk score based on interactions with flagged addresses.
      description: Price $0.003.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties: { address: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/quote/{symbol}:
    get:
      tags: [Data]
      summary: Stock quote — price, market cap, volume.
      description: Price $0.001.
      parameters: [{ $ref: "#/components/parameters/Symbol" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/index/{name}:
    get:
      tags: [Data]
      summary: Current snapshot of a market index (S&P 500, Nasdaq…).
      description: Price $0.001.
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          example: SP500
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/analyst/{symbol}:
    get:
      tags: [Data]
      summary: Consensus analyst recommendations for a symbol.
      description: Price $0.001.
      parameters: [{ $ref: "#/components/parameters/Symbol" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/macro:
    post:
      tags: [Data]
      summary: Latest macro news items affecting the market.
      description: Price $0.002.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { token: { type: string }, region: { type: string } } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/market:
    post:
      tags: [Data]
      summary: Token / project-specific news from crypto + finance sources.
      description: Price $0.002.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { token: { type: string } } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/pools:
    get:
      tags: [Data]
      summary: Yield pools across DeFi protocols, sorted by APY.
      description: Price $0.002. DeFiLlama yields, filterable by `token` and `min_tvl_usd`, capped at `limit` rows (default 20, max 100).
      x-live: true
      parameters:
        - { name: token,        in: query, schema: { type: string  }, required: false }
        - { name: min_tvl_usd,  in: query, schema: { type: integer }, required: false, description: "Default 100 000." }
        - { name: limit,        in: query, schema: { type: integer }, required: false }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/tvl/{protocol}:
    get:
      tags: [Data]
      summary: Current TVL for a DeFi protocol.
      description: Price $0.001. DeFiLlama-backed. Pass the protocol slug (e.g. `aave-v3`, `uniswap-v3`).
      x-live: true
      parameters: [{ $ref: "#/components/parameters/Protocol" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/gas/estimate:
    get:
      tags: [Data]
      summary: Live Arc gas price + USDC cost per common op.
      description: Price $0.0005. Reads `eth_gasPrice` from Arc RPC and pre-computes the USDC cost for `native_transfer`, `erc20_transfer`, `erc20_approve`, `uniswap_v2_swap`, `uniswap_v2_add_lp`.
      x-live: true
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
  /v1/il/estimate:
    post:
      tags: [Data]
      summary: Estimate impermanent loss exposure for an LP position.
      description: Price $0.001.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pool]
              properties:
                pool:    { type: string }
                amount:  { type: number }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
